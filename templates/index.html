<!DOCTYPE html>
<html>
<head>
    <title>Fake Review Detector</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #2c5364, #203a43, #0f2027);
            text-align: center;
            padding: 40px;
            color: white;
        }

        .container {
            background: white;
            color: black;
            width: 600px;
            margin: auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.4);
        }

        input, textarea {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background-color: #2c5364;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .bar-container {
            width: 90%;
            background-color: #ddd;
            border-radius: 10px;
            margin: 10px auto;
        }

        .bar {
            height: 20px;
            border-radius: 10px;
            text-align: center;
            color: white;
        }

        .fake { background-color: #e74c3c; }
        .real { background-color: #27ae60; }

        .result { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Fake Review Detector</h1>

    <input type="text" id="product" placeholder="Enter Product Name">
    <textarea id="review" rows="5" placeholder="Enter Review"></textarea>
    <br>
    <button onclick="predict()">Check Review</button>

    <div class="result" id="result"></div>

    <div class="bar-container">
        <div id="fakeBar" class="bar fake"></div>
    </div>

    <div class="bar-container">
        <div id="realBar" class="bar real"></div>
    </div>
</div>

<script>
function predict() {
    const product = document.getElementById("product").value;
    const review = document.getElementById("review").value;

    fetch("/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ product: product, review: review })
    })
    .then(response => response.json())
    .then(data => {

        let confidence = data.confidence;
        let fakePercent = 0;
        let realPercent = 0;

        if (data.prediction == "1") {
            realPercent = confidence;
            fakePercent = 100 - confidence;
        } else {
            fakePercent = confidence;
            realPercent = 100 - confidence;
        }

        document.getElementById("result").innerHTML =
            "Prediction: " + (data.prediction == "1" ? "Real Review ✅" : "Fake Review ❌") + "<br>" +
            "Confidence: " + confidence + "%<br>" +
            "Sentiment: " + data.sentiment;

        document.getElementById("fakeBar").style.width = fakePercent + "%";
        document.getElementById("fakeBar").innerHTML = "Fake: " + fakePercent.toFixed(1) + "%";

        document.getElementById("realBar").style.width = realPercent + "%";
        document.getElementById("realBar").innerHTML = "Real: " + realPercent.toFixed(1) + "%";
    });
}
</script>

</body>
</html>
