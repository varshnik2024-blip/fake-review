<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fake Review Detector</title>

    <style>
        body {
            background: #0b1f2e;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            margin-top: 40px;
        }

        form {
            margin: 30px;
        }

        input {
            padding: 12px;
            width: 300px;
            border-radius: 20px;
            border: none;
        }

        button {
            padding: 12px 20px;
            border-radius: 20px;
            border: none;
            background: #00c97b;
            color: white;
            cursor: pointer;
        }

        /* 🔥 GRID FIX (HORIZONTAL) */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px;
        }

        .card {
            background: #132f44;
            padding: 20px;
            border-radius: 15px;
        }

        /* 🔥 IMAGE FIX */
        .product-img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            background: white;
            border-radius: 10px;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background: #00c97b;
            color: white;
            border-radius: 20px;
            text-decoration: none;
        }
    </style>
</head>

<body>

<h1>Detect Fake Reviews Before You Buy Anything</h1>

<form method="POST">
    <input type="text" name="product" placeholder="Enter product..." required>
    <button type="submit">SCAN</button>
</form>

{% if query %}
<h2>Results for "{{ query }}"</h2>
{% endif %}

<div class="products">

{% for p in products %}
    <div class="card">

        <!-- 🔥 IMAGE CLICKABLE -->
        <a href="{{ p.link }}" target="_blank">
            <img src="{{ p.image }}" class="product-img"
                 onerror="this.src='https://via.placeholder.com/300?text=No+Image'">
        </a>

        <h3>{{ p.title }}</h3>
        <p>{{ p.price }}</p>

        <p>Fake: {{ p.fake }}%</p>
        <p>Real: {{ p.real }}%</p>

        <a href="{{ p.link }}" target="_blank" class="btn">
            View on Amazon
        </a>

    </div>
{% endfor %}

</div>

</body>
</html>
