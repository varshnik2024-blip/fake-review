<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TrustScan Login</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }
        input {
            padding: 10px;
            margin: 5px;
            width: 250px;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>Login / Signup</h2>

    <input type="email" id="email" placeholder="Enter Email"><br>
    <input type="password" id="password" placeholder="Enter Password"><br>

    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>

    <p id="message"></p>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword 
        } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDU9tRoJnYxgYOVYYJ5hp01WlPc8bNBhFA",
            authDomain: "trustscan-bba50.firebaseapp.com",
            projectId: "trustscan-bba50",
            storageBucket: "trustscan-bba50.firebasestorage.app",
            messagingSenderId: "602446002339",
            appId: "1:602446002339:web:aadbaa1a38e6764d126716"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // SIGN UP
        window.signup = function () {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    document.getElementById("message").innerText = "Signup Successful ✅";
                })
                .catch((error) => {
                    document.getElementById("message").innerText = error.message;
                });
        };

        // LOGIN
        window.login = function () {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    document.getElementById("message").innerText = "Login Successful ✅";
                })
                .catch((error) => {
                    document.getElementById("message").innerText = error.message;
                });
        };
    </script>

</body>
</html>
