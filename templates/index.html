<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrustScan</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

.hidden { display: none; }

.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    background: white;
}

.logo { color: green; }

.hero { margin-top: 50px; }

.product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
}

.star.full { color: gold; }
.star.half { color: gold; opacity: 0.5; }
.star.empty { color: lightgray; }

.modal {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
}

.modal-content {
    background: white;
    margin: 10% auto;
    padding: 20px;
    width: 60%;
    border-radius: 10px;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="login-box">
    <h2>Login with Phone</h2>

    <input type="text" id="phone" placeholder="+91XXXXXXXXXX"><br><br>
    <button id="send-otp-btn" onclick="sendOTP()">Send OTP</button><br><br>

    <input type="text" id="otp" placeholder="Enter OTP"><br><br>
    <button onclick="verifyOTP()">Verify OTP</button>
</div>

<!-- MAIN SITE -->
<div id="main-site" class="hidden">

<div class="navbar">
    <h2 class="logo">TrustScan</h2>
    <div>
        <button onclick="openModal()">How it Works</button>
        <button onclick="openAbout()">About</button>
    </div>
</div>

<div class="hero">
    <h1>Detect <span style="color:red;">Fake</span> Reviews</h1>
</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <button onclick="closeModal()">Close</button>
    <h2>How it Works</h2>
    <p>Enter product → Fetch data → Analyze → Show result</p>
  </div>
</div>

<div id="aboutModal" class="modal hidden">
  <div class="modal-content">
    <button onclick="closeAbout()">Close</button>
    <h2>About</h2>
    <p>TrustScan detects fake reviews before buying.</p>
  </div>
</div>

<script>
function openModal() {
    document.getElementById("modal").classList.remove("hidden");
}
function closeModal() {
    document.getElementById("modal").classList.add("hidden");
}
function openAbout() {
    document.getElementById("aboutModal").classList.remove("hidden");
}
function closeAbout() {
    document.getElementById("aboutModal").classList.add("hidden");
}
</script>

<!-- 🔥 FIREBASE FINAL FIX -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDU9tRoJnYxgYOYYYJ5hp01WLPc8bNBhFA",
  authDomain: "trustscan-bba50.firebaseapp.com",
  projectId: "trustscan-bba50",
  storageBucket: "trustscan-bba50.appspot.com",
  messagingSenderId: "602446002339",
  appId: "1:602446002339:web:aadbaa1a38e6764d126716"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.recaptchaVerifier = new RecaptchaVerifier(auth, 'send-otp-btn', {
    'size': 'invisible'
});

window.sendOTP = function() {
    const phone = document.getElementById("phone").value;

    signInWithPhoneNumber(auth, phone, window.recaptchaVerifier)
    .then((confirmationResult) => {
        window.confirmationResult = confirmationResult;
        alert("OTP sent!");
    })
    .catch((error) => {
        alert(error.message);
    });
}

window.verifyOTP = function() {
    const code = document.getElementById("otp").value;

    window.confirmationResult.confirm(code)
    .then(() => {
        alert("Login success");
        document.getElementById("login-box").style.display = "none";
        document.getElementById("main-site").classList.remove("hidden");
    })
    .catch(() => alert("Invalid OTP"));
}
</script>

</body>
</html>
